<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 380" role="img" aria-label="NetPulse four-agent pipeline diagram">
  <defs>
    <pattern id="hex" width="34" height="29.4" patternUnits="userSpaceOnUse" patternTransform="translate(0,0)">
      <path d="M17 0 L34 9.8 L34 19.6 L17 29.4 L0 19.6 L0 9.8 Z" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.18"/>
    </pattern>
    <linearGradient id="agentG" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%"  stop-color="#533483"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#bcd1ca"/>
    </marker>
  </defs>

  <rect width="520" height="380" fill="url(#hex)"/>

  <!-- Connection lines -->
  <g stroke="#bcd1ca" stroke-width="1.4" fill="none" marker-end="url(#arrow)">
    <line x1="118" y1="100" x2="178" y2="100"/>
    <line x1="118" y1="100" x2="178" y2="200"/>
    <line x1="118" y1="100" x2="178" y2="300"/>
    <line x1="298" y1="100" x2="358" y2="200"/>
    <line x1="298" y1="200" x2="358" y2="200"/>
    <line x1="298" y1="300" x2="358" y2="200"/>
  </g>

  <!-- Agent nodes -->
  <g font-family="Inter, sans-serif" fill="#faf9f5">
    <!-- Classifier -->
    <g transform="translate(20,70)">
      <rect width="100" height="60" rx="10" fill="url(#agentG)" stroke="#4a8c5e" stroke-width="1.5"/>
      <text x="50" y="28" font-size="11" font-weight="700" text-anchor="middle">CLASSIFIER</text>
      <text x="50" y="44" font-size="9"  fill="#bcd1ca" text-anchor="middle">category · region</text>
    </g>

    <!-- Network investigator -->
    <g transform="translate(180,70)">
      <rect width="120" height="60" rx="10" fill="url(#agentG)" stroke="#4a8c5e" stroke-width="1.5"/>
      <text x="60" y="28" font-size="11" font-weight="700" text-anchor="middle">NETWORK</text>
      <text x="60" y="44" font-size="9"  fill="#bcd1ca" text-anchor="middle">BigQuery events</text>
    </g>

    <!-- CDR analyzer -->
    <g transform="translate(180,170)">
      <rect width="120" height="60" rx="10" fill="url(#agentG)" stroke="#4a8c5e" stroke-width="1.5"/>
      <text x="60" y="28" font-size="11" font-weight="700" text-anchor="middle">CDR ANALYZER</text>
      <text x="60" y="44" font-size="9"  fill="#bcd1ca" text-anchor="middle">AlloyDB AI NL2SQL</text>
    </g>

    <!-- Spare slot for visual balance: a "context" hint node -->
    <g transform="translate(180,270)">
      <rect width="120" height="60" rx="10" fill="#0f3460" stroke="#bcd1ca" stroke-width="1" opacity="0.85"/>
      <text x="60" y="28" font-size="11" font-weight="700" text-anchor="middle" fill="#faf9f5">CONTEXT</text>
      <text x="60" y="44" font-size="9"  fill="#bcd1ca" text-anchor="middle">10 cities · 50K events</text>
    </g>

    <!-- Response formatter -->
    <g transform="translate(360,170)">
      <rect width="140" height="60" rx="10" fill="url(#agentG)" stroke="#d97757" stroke-width="2"/>
      <text x="70" y="28" font-size="11" font-weight="700" text-anchor="middle">RESPONSE FORMATTER</text>
      <text x="70" y="44" font-size="9"  fill="#bcd1ca" text-anchor="middle">writes ticket</text>
    </g>

    <!-- Output ticket pill -->
    <g transform="translate(360,260)">
      <rect width="140" height="36" rx="18" fill="#4a8c5e"/>
      <text x="70" y="22" font-size="11" font-weight="700" text-anchor="middle">→ Ticket #74</text>
    </g>
  </g>

  <!-- Caption -->
  <text x="260" y="360" font-family="Inter, sans-serif" font-size="10" fill="#d1cfc5" text-anchor="middle">
    Four ADK sub-agents · Sequential · ≈10 s end-to-end on Vertex Gemini
  </text>
</svg>
